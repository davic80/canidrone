services:

  app:
    image: ghcr.io/davic80/canidrone:${IMAGE_TAG:-latest}
    build: .
    container_name: canidrone-app
    ports:
      - "8090:80"
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: canidrone-tunnel
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      app:
        condition: service_healthy

networks:
  internal:
    driver: bridge
