name: Build & Push Docker Image

on:
  push:
    branches:
      - master
    tags:
      - "*" # Ahora acepta cualquier tag, no solo los que empiezan por "v"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ── Job 1: Build & Push ──────────────────────────────────────────────────────
  build-push:
    name: Build multi-arch image and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Forzamos el nombre del repo a minúsculas para evitar errores 403 de Case Sensitivity
      - name: Prepare Image Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Añadimos etiquetas explícitas para vincular el paquete al repo
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Canidrone Docker Image
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha,prefix=,format=short,enable=${{ github.ref == 'refs/heads/master' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: GitHub Release (only on tags) ─────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-push
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Version and Image Name
        run: |
          # Extrae la versión quitando la 'v' si existe, o dejándola igual si no está
          CLEAN_VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$CLEAN_VERSION" >> $GITHUB_ENV
          echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Compose release notes
        run: |
          DIGEST="${{ needs.build-push.outputs.digest }}"

          {
            echo "## What's New"
            echo ""
            echo "See [CHANGELOG.md](CHANGELOG.md) for details."
            echo ""
            echo "---"
            echo ""
            echo "## Docker (Public Image)"
            echo ""
            echo '```bash'
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.VERSION }}"
            echo '```'
            echo ""
            echo "| Property | Value |"
            echo "|---|---|"
            echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.VERSION }}\` |"
            echo "| **Tags** | \`${{ env.VERSION }}\`, \`latest\` |"
            echo "| **Platforms** | \`linux/amd64\`, \`linux/arm64\` |"
            echo "| **Digest** | \`${DIGEST}\` |"
            echo ""
            echo "### Deploy on Raspberry Pi"
            echo '```bash'
            echo "docker compose pull && docker compose up -d"
            echo ""
            echo "# Or pin this specific version"
            echo "IMAGE_TAG=${{ env.VERSION }} docker compose up -d"
            echo '```'
          } > /tmp/release_notes.md

      - name: Create or Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release_notes.md || \
          gh release edit "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release_notes.md
