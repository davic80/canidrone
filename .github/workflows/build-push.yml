name: Build & Push Docker Image

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ── Job 1: Build & Push ──────────────────────────────────────────────────────
  build-push:
    name: Build multi-arch image and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Forzamos el nombre del repo a minúsculas por seguridad (GHCR lo requiere)
      - name: Prepare Image Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=,format=short,enable=${{ github.ref == 'refs/heads/master' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: GitHub Release (only on version tags) ─────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-push
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compose release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DIGEST="${{ needs.build-push.outputs.digest }}"

          {
            echo "## What's New"
            echo ""
            echo "See [CHANGELOG.md](CHANGELOG.md) for details."
            echo ""
            echo "---"
            echo ""
            echo "## Docker"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/davic80/canidrone:${VERSION}"
            echo '```'
            echo ""
            echo "| Property | Value |"
            echo "|---|---|"
            echo "| **Image** | \`ghcr.io/davic80/canidrone:${VERSION}\` |"
            echo "| **Tags** | \`${VERSION}\`, \`latest\` |"
            echo "| **Platforms** | \`linux/amd64\`, \`linux/arm64\` |"
            echo "| **Digest** | \`${DIGEST}\` |"
            echo ""
            echo "### Deploy on Raspberry Pi"
            echo '```bash'
            echo "docker compose pull && docker compose up -d"
            echo ""
            echo "# Or pin this specific version"
            echo "IMAGE_TAG=${VERSION} docker compose up -d"
            echo '```'
          } > /tmp/release_notes.md

      - name: Create or Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release_notes.md || \
          gh release edit "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release_notes.md
